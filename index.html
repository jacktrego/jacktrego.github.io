<!DOCTYPE html>
<html lang="en">
<head>
  <title>Jack Trego — Creative Producer</title>
  <link rel="shortcut icon" type="image/x-icon" href="./images/icon 3.ico"/>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./main.css">
</head>
<body>

  <!-- Custom cursor -->
  <div class="cursor" id="cursor"></div>

  <!-- Hover images -->
  <div class="hover-image" id="hover-batch">
    <video autoplay muted loop playsinline>
      <source src="./images/batch/00.mp4" type="video/mp4">
    </video>
  </div>
  <div class="hover-image" id="hover-tof">
    <img src="./images/tof/02_TOF_Website_16x9.jpg" alt="Type of Feeling">
  </div>
  <div class="hover-image" id="hover-woc">
    <img src="./images/woc/01_WOC.gif" alt="World Ocean Celebration">
  </div>
  <div class="hover-image" id="hover-isodope">
    <video autoplay muted loop playsinline>
      <source src="./images/isodope/Rad Future_01.mp4" type="video/mp4">
    </video>
  </div>

  <div class="site">

    <!-- Top left: identity -->
    <header class="site-header">
      <a href="./index.html">
        <p class="site-name">Jack Trego</p>
        <p class="site-role">Creative Producer</p>
      </a>
    </header>

    <!-- Center: client list -->
    <main class="site-main">
      <ul class="client-list">
        <li>
          <a href="./pages/batch.html"
             data-hover="hover-batch"
             class="project-link">Batch</a>
        </li>
        <li>
          <a href="./pages/tof.html"
             data-hover="hover-tof"
             class="project-link">Type of Feeling</a>
        </li>
        <li>
          <a href="./pages/isodope.html"
             data-hover="hover-isodope"
             class="project-link">Isodope Rad Future</a>
        </li>
        <li>
          <a href="./pages/woc.html"
             data-hover="hover-woc"
             class="project-link">World Ocean Celebration</a>
        </li>
      </ul>
    </main>

    <!-- Bottom: nav left + client list request right -->
    <footer class="site-footer">
      <div class="site-footer-left">
        <a href="./pages/about.html">About</a>
        <a href="mailto:jackctrego@gmail.com">Contact</a>
      </div>
      <div class="site-footer-right">
        <a href="mailto:jackctrego@gmail.com">Full client list available upon request</a>
      </div>
    </footer>

  </div>

  <script>
    // Custom cursor
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });

    // Hover images follow cursor via transform
    const hoverImages = document.querySelectorAll('.hover-image');
    const projectLinks = document.querySelectorAll('.project-link');

    document.addEventListener('mousemove', e => {
      const x = e.clientX;
      const y = e.clientY;
      hoverImages.forEach(img => {
        img.style.transform = `translate(${x - 170}px, ${y - img.offsetHeight - 16}px)`;
      });
    });

    projectLinks.forEach(link => {
      const targetId = link.dataset.hover;
      const img = document.getElementById(targetId);
      if (!img) return;

      link.addEventListener('mouseenter', () => {
        img.classList.add('visible');
        cursor.classList.add('hovering');
      });

      link.addEventListener('mouseleave', () => {
        img.classList.remove('visible');
        cursor.classList.remove('hovering');
      });
    });

    // Footer links cursor state
    document.querySelectorAll('a').forEach(a => {
      a.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
      a.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
    });
  </script>

</body>
</html>
